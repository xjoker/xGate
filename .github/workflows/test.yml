name: tests

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # setup-uv v8+ 不再发布 @v8 / @v8.0 浮动 tag（supply-chain 防护），
      # 必须 pin 到 immutable patch tag。下次升级时手动 bump 此处。
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Dependency CVE audit (pip-audit, strict)
        # 扫 OSV + PyPI Advisory DB；发现任何已知漏洞或元数据缺失即失败。
        # 与 dependabot 互补：dependabot 推 patch PR，pip-audit 阻断 merge。
        run: uv tool run pip-audit --strict
